<!doctype html>
<html lang="">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="/favicon.ico" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

  <!-- Mobile Web App Support -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="FlatNas" />
  <link rel="apple-touch-icon" href="/favicon.ico" />
  <meta name="format-detection" content="telephone=no" />

  <!-- Chinese Browser Support (VIA, Quark, UC) -->
  <!-- UC Browser -->
  <meta name="layoutmode" content="standard" />
  <meta name="wap-font-scale" content="no" />
  <meta name="renderer" content="webkit" />
  <meta name="nightmode" content="disable" />
  <meta name="browsermode" content="application" />
  <!-- Quark Browser -->
  <meta name="imagemode" content="force" />
  <meta name="x5-page-mode" content="app" />
  <meta name="x5-orientation" content="auto" />
  <meta name="full-screen" content="yes" />
  <meta name="x5-fullscreen" content="true" />
  <meta name="360-fullscreen" content="true" />

  <title>FlatNas</title>

  <!-- Partytown config: offload third-party scripts to Web Worker -->
  <script>
    window.partytown = {
      forward: ["dataLayer.push", "gtag", "adsbygoogle"],
      resolveUrl: function (url) {
        if (
          url.hostname === "pagead2.googlesyndication.com" ||
          url.hostname === "googleads.g.doubleclick.net" ||
          url.hostname === "adservice.google.com"
        ) {
          return {
            href: url.href,
            protocol: url.protocol,
            host: "https://www.googletagmanager.com",
            hostname: "www.googletagmanager.com",
            port: "",
            pathname: "/gtag/js",
            search: url.search,
            hash: url.hash,
          };
        }
        return url;
      },
      lib: "/~partytown/",
    };
  </script>
  <script async src="/~partytown/partytown.js" data-vite-ignore></script>

  <!-- AdSense script loaded via Partytown (Web Worker) to avoid blocking main thread -->
  <script type="text/partytown" async
    src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX"
    crossorigin="anonymous"></script>
</head>

<body>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
